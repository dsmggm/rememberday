name = "rememberday"
main = "src/index.js"
compatibility_date = "2026-06-27"

# 静态资源目录（前端页面）
[assets]
directory = "./public"
binding = "ASSETS"

# 环境变量：纪念日配置
# 修改下方变量后重新部署即可更新页面显示
[vars]
PERSON_A = "小明"
PERSON_B = "小红"
START_DATE = "2020-01-01"

# D1 数据库绑定（留言板数据存储）
# database_id 请替换为你自己创建的数据库 ID
[[d1_databases]]
binding = "DB"
database_name = "RememberDay"
database_id = "在此填入你的数据库ID"
