name = "rememberday"
main = "src/index.js"
compatibility_date = "2026-06-27"

# 静态资源目录（前端页面）
[assets]
directory = "./public"
binding = "ASSETS"

# 环境变量：纪念日配置
# 修改下方变量后重新部署即可更新页面显示
[vars]
PERSON_A = "唐海浪"
PERSON_B = "小庄"
START_DATE = "1868-01-01"

# Durable Objects 绑定（留言板数据存储）
# 部署时自动创建，无需手动创建数据库或填写任何 ID
[[durable_objects.bindings]]
name = "MESSAGES"
class_name = "MessagesDB"

# Durable Objects 迁移：声明使用 SQLite 存储后端的类
# 首次部署时自动创建该对象，后续部署幂等
[[migrations]]
tag = "v1"
new_sqlite_classes = ["MessagesDB"]
